services:
  # ── 后端（FastAPI）────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # 应用配置（可通过 .env 文件覆盖，见 .env.example）
      - COLLEI_DEBUG=${COLLEI_DEBUG:-false}
      - COLLEI_APP_NAME=${COLLEI_APP_NAME:-Collei}
      # 数据库（SQLite 挂载到宿主机持久卷）
      - COLLEI_DATABASE_URL=sqlite+aiosqlite:////data/collei.db
      # 安全配置 — ⚠️ 生产环境必须修改 ⚠️
      - COLLEI_SECRET_KEY=${COLLEI_SECRET_KEY:-change-me-to-a-random-secret-key}
      - COLLEI_ALGORITHM=${COLLEI_ALGORITHM:-HS256}
      - COLLEI_ACCESS_TOKEN_EXPIRE_MINUTES=${COLLEI_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - COLLEI_SESSION_EXPIRE_DAYS=${COLLEI_SESSION_EXPIRE_DAYS:-7}
      # 防暴力破解
      - COLLEI_LOGIN_ATTEMPT_LIMIT=${COLLEI_LOGIN_ATTEMPT_LIMIT:-10}
      - COLLEI_LOGIN_ATTEMPT_WINDOW=${COLLEI_LOGIN_ATTEMPT_WINDOW:-600}
      # 初始管理员（首次启动时自动创建）
      - COLLEI_DEFAULT_ADMIN_USERNAME=${COLLEI_DEFAULT_ADMIN_USERNAME:-admin}
      - COLLEI_DEFAULT_ADMIN_PASSWORD=${COLLEI_DEFAULT_ADMIN_PASSWORD:-}
    volumes:
      # 数据库持久化
      - collei-data:/data
    networks:
      - collei-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 前端（React，来自 collei-monitor/collei-web）─────────────────────────
  frontend:
    image: ghcr.io/collei-monitor/collei-web:latest
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
      - VITE_WS_URL=${VITE_WS_URL:-/api/v1/ws}
    networks:
      - collei-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx 反向代理 ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${COLLEI_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - collei-net
    depends_on:
      - backend
      - frontend

volumes:
  collei-data:
    driver: local

networks:
  collei-net:
    driver: bridge
