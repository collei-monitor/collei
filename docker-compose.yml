services:
  collei:
    image: collei:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FRONTEND_REPO: https://github.com/collei-monitor/collei-web.git
        FRONTEND_REF: main
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      # SQLite 数据库存放在持久化卷中
      - COLLEI_DATABASE_URL=sqlite+aiosqlite:////data/collei.db
      # 可选配置
      # - COLLEI_SECRET_KEY=KFCFKQXSVW50
      # - COLLEI_DEFAULT_ADMIN_USERNAME=admin
      # - COLLEI_DEFAULT_ADMIN_PASSWORD=
      # - COLLEI_DEBUG=false
      # - COLLEI_APP_NAME=Collei
    restart: unless-stopped
